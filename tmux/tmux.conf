# ============================================================================
# Core
# ============================================================================
set -g prefix C-j
set-option -g default-terminal "screen-256color"
set -g terminal-overrides 'xterm:colors=256'

# Avoid macOS path_helper reordering PATH and shadowing mise shims
# (tmux defaults to login shell on macOS, which evals /etc/zprofile)
set -g default-command "${SHELL}"

set-option -g history-limit 50000
set-option -sg escape-time 10
set-option -g focus-events on
set-option -g mouse on

set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

setw -g mode-keys vi
setw -g monitor-activity on
set -g visual-activity off
set -g display-panes-time 2000
set -g display-time 1500

# ============================================================================
# Color palette — blue / cyan gradient on neutral dark
#   bg_base  colour234 (#1c1c1c)
#   bg_deep  colour17  (#00005f)
#   navy     colour24  (#005f87)
#   sky      colour39  (#00afff)
#   aqua     colour45  (#00d7ff)
#   cyan     colour51  (#00ffff)
#   ice      colour123 (#87ffff)
#   muted    colour244 (#808080)
#   fg       colour255 (#eeeeee)
# ============================================================================

# ============================================================================
# Status bar
# ============================================================================
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=colour234,fg=colour255"

# Left — session list with nested window list
#   Session badge:
#     current-client-session  : cyan-bg bold         (#[fg=234,bg=51,bold])
#     other-client attached   : sky-bg  bold         (#[fg=234,bg=39,bold])
#     unattached              : grey-bg              (#[fg=255,bg=240])
#   Window item inside each session:
#     active & current session: cyan bold
#     active & other session  : sky
#     inactive                : muted grey
set -g status-left-length 400
set -g status-left "#{S:#{?#{==:#S,#{E:client_session}},#[fg=colour234#,bg=colour51#,bold] #S #[fg=colour51#,bg=colour234],#{?session_attached,#[fg=colour234#,bg=colour39#,bold] #S #[fg=colour39#,bg=colour234],#[fg=colour255#,bg=colour240] #S #[fg=colour240#,bg=colour234]}}#{W:#{?window_active,#{?#{==:#S,#{E:client_session}},#[fg=colour51#,bg=colour234#,bold],#[fg=colour39#,bg=colour234]},#[fg=colour244#,bg=colour234]} #I·#{b:pane_current_path}} #[fg=colour240#,bg=colour234]│ }"

# Window list area is hidden — sessions take its place
setw -g window-status-separator ""
setw -g window-status-format ""
setw -g window-status-current-format ""
setw -g window-status-activity-style "fg=colour51,bg=colour234"
setw -g window-status-bell-style "fg=colour234,bg=colour51,bold"

# Right — claude indicator · current window:name · git branch · clock · date
set -g status-right-length 140
set -g status-right "\
#{?#{==:#{pane_current_command},claude},#[fg=colour51#,bg=colour234]#[fg=colour234#,bg=colour51#,bold] CLAUDE #[fg=colour51#,bg=colour234],}\
#[fg=colour17,bg=colour234]#[fg=colour123,bg=colour17] #I:#W \
#[fg=colour24,bg=colour17]#[fg=colour51,bg=colour24] #(cd '#{pane_current_path}' && git symbolic-ref --short HEAD 2>/dev/null || echo '-') \
#[fg=colour45,bg=colour24]#[fg=colour234,bg=colour45] %H:%M \
#[fg=colour51,bg=colour45]#[fg=colour234,bg=colour51,bold] %Y-%m-%d "

# Pane borders — titled so each pane is identifiable at a glance
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour51"
set -g pane-border-status top
set -g pane-border-format "\
#{?pane_active,#[fg=colour234#,bg=colour51#,bold],#[fg=colour234#,bg=colour244]} #P \
#{?pane_active,#[fg=colour51#,bg=colour234],#[fg=colour244#,bg=colour234]} #{pane_current_command} \
#{?pane_active,#[fg=colour45],#[fg=colour240]}#{b:pane_current_path}"

# Messages / modes
set -g message-style "bg=colour51,fg=colour234,bold"
set -g message-command-style "bg=colour24,fg=colour51,bold"
setw -g mode-style "bg=colour24,fg=colour51,bold"
setw -g clock-mode-colour colour51

# ============================================================================
# Keybindings
# ============================================================================
# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Splits keep current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Session / window / pane visualization
bind s choose-tree -Zs           # session picker (zoomed)
bind w choose-tree -Zw           # window picker (zoomed)
bind t choose-tree -ZN           # full tree (sessions+windows+panes)
bind P display-panes             # highlight pane numbers

# Sync panes toggle — broadcast keystrokes to all panes
bind y set-window-option synchronize-panes \; display-message "sync-panes: #{?pane_synchronized,ON,OFF}"

# Reload config
bind -r C-r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display-message "reloaded: tmux.conf"

# ============================================================================
# AI-native helpers (no plugins)
#   prefix + C : new "claude" window at current path, run claude
#   prefix + A : split right 40% and run claude beside current work
#   prefix + R : rename current window (handy for task-per-window workflow)
# ============================================================================
bind C new-window -n claude -c "#{pane_current_path}" "claude"
bind A split-window -h -l 40% -c "#{pane_current_path}" "claude"
bind R command-prompt -I "#W" "rename-window '%%'"

# vim: ft=tmux
